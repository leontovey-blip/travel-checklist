<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>

  <!-- 飞机图标 -->
  <g transform="translate(256, 256) scale(0.8)">
    <!-- 机身 -->
    <path d="M 0,-120 L 15,-100 L 15,80 L 80,100 L 80,120 L 15,100 L 15,140 L 40,150 L 40,170 L 0,160 L -40,170 L -40,150 L -15,140 L -15,100 L -80,120 L -80,100 L -15,80 L -15,-100 Z"
          fill="white" opacity="0.95"/>

    <!-- 机翼 -->
    <path d="M -15,-40 L -120,20 L -120,40 L -15,0 Z"
          fill="white" opacity="0.9"/>
    <path d="M 15,-40 L 120,20 L 120,40 L 15,0 Z"
          fill="white" opacity="0.9"/>

    <!-- 尾翼 -->
    <path d="M -15,-100 L -50,-130 L -50,-115 L -15,-90 Z"
          fill="white" opacity="0.85"/>
    <path d="M 15,-100 L 50,-130 L 50,-115 L 15,-90 Z"
          fill="white" opacity="0.85"/>
  </g>
</svg>
